<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Giải Thưởng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
            <li class="breadcrumb-item active" aria-current="page">Quản lý giải thưởng</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Quản lý giải thưởng</h2>
            <p class="text-muted mb-0">Tạo hạng mục giải thưởng, theo dõi phạm vi áp dụng và quản lý người nhận giải.</p>
        </div>
        <div class="d-flex gap-2">
          
            <a href="/awards/new" class="btn btn-primary">+ Thêm giải thưởng</a>
        </div>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-bordered table-hover bg-white mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Tên giải thưởng</th>
                    <th>Loại giải</th>
                    <th>Phạm vi</th>
                    <th>Mùa giải / Trận đấu</th>
                    <th>Giá trị (VNĐ)</th>
                    <th>Trạng thái</th>
                    <th style="width: 320px;">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a, i : ${awards}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${a.awardName}"></td>
                    <td>
                        <span th:text="${a.awardType}"
                              th:class="${a.awardType == 'CÁ NHÂN'} ? 'badge bg-info text-dark' : 'badge bg-primary'"></span>
                    </td>
                    <td th:text="${a.scope}"></td>
                    <td>
                        <span th:if="${a.season}" th:text="${a.season.seasonName}"></span>
                        <span th:if="${a.match}" th:text="${matchDisplayNames[a.match.id] != null ? matchDisplayNames[a.match.id] : 'Chưa xác định'}"></span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(a.prizeAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                    <td><span class="badge bg-success" th:text="${a.status}"></span></td>
                    <td>
                        <div class="d-flex flex-nowrap gap-1 align-items-center">
                            <a th:href="@{/awards/{id}/edit(id=${a.id})}" class="btn btn-sm btn-warning">Sửa</a>
                            <a th:href="@{/award-results/award/{awardId}(awardId=${a.id})}" class="btn btn-sm btn-info text-dark">Người nhận</a>
                            <form th:action="@{/awards/{id}/delete(id=${a.id})}"
                                  method="post"
                                  class="mb-0"
                                  onsubmit="return confirm('Xác nhận hủy áp dụng giải thưởng này?')">
                                <button type="submit" class="btn btn-sm btn-danger">Hủy áp dụng</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(awards)}">
                    <td colspan="8" class="text-center text-muted py-4">Chưa có giải thưởng nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
