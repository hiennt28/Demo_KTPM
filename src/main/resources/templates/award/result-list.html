<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Người Nhận Giải</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h3 th:text="${'Người nhận giải: ' + award.awardName}"></h3>
    <p class="text-muted mb-3">
        <span th:text="${award.awardType}"></span>
        |
        <span th:text="${award.scope}"></span>
    </p>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <div class="d-flex gap-2 mb-3">
        <a th:href="@{/award-results/award/{awardId}/new(awardId=${award.id})}"
           class="btn btn-primary">+ Thêm người nhận</a>
        <a href="/awards" class="btn btn-secondary">Quay lại giải thưởng</a>
    </div>

    <table class="table table-bordered bg-white">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Người/Đội nhận</th>
            <th>Người đại diện</th>
            <th>Số tài khoản</th>
            <th>Ngân hàng</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r, i : ${results}">
            <td th:text="${i.count}"></td>
            <td>
                <span th:if="${r.team}" th:text="${r.team.teamName}"></span>
                <span th:if="${r.playerContract}"
                      th:text="${r.playerContract.player.fullName + ' - ' + r.playerContract.team.teamName}"></span>
            </td>
            <td th:text="${r.representative}"></td>
            <td th:text="${r.bankAccount}"></td>
            <td th:text="${r.bankName}"></td>
            <td>
                <span th:text="${r.paymentStatus}"
                      th:class="${r.paymentStatus == 'ĐÃ THANH TOÁN'} ? 'badge bg-success' : 'badge bg-warning text-dark'">
                </span>
            </td>
            <td>
                <a th:href="@{/award-results/{id}/edit(id=${r.id})}"
                   class="btn btn-sm btn-warning">Sửa</a>
                <form th:action="@{/award-results/{id}/delete(id=${r.id})}"
                      method="post" style="display:inline"
                      onsubmit="return confirm('Xóa người nhận giải này?')">
                    <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(results)}">
            <td colspan="7" class="text-center text-muted">Chưa có người nhận giải nào.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
