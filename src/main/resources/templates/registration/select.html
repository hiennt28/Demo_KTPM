<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Thi Đấu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2>Đăng Ký Cầu Thủ Cho Trận Đấu</h2>
    <hr>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="card p-3 mb-3">
        <h6 class="fw-bold mb-2">1. Chọn mùa giải</h6>
        <div class="d-flex gap-2 flex-wrap">
            <a th:each="s : ${seasons}"
               th:href="@{/registration(seasonId=${s.id})}"
               th:text="${s.seasonName}"
               th:classappend="${s.id == selectedSeasonId}
                               ? 'btn btn-primary' : 'btn btn-outline-primary'">
            </a>
        </div>
    </div>

    <div th:if="${rounds}" class="card p-3 mb-3">
        <h6 class="fw-bold mb-2">2. Chọn vòng đấu</h6>
        <div class="d-flex gap-2 flex-wrap">
            <a th:each="r : ${rounds}"
               th:href="@{/registration(seasonId=${selectedSeasonId}, roundId=${r.id})}"
               th:text="${r.roundName}"
               th:classappend="${r.id == selectedRoundId}
                               ? 'btn btn-success' : 'btn btn-outline-success'">
            </a>
        </div>
    </div>

    <div th:if="${matches}">
        <h6 class="fw-bold">3. Chọn trận đấu</h6>
        <table class="table table-bordered bg-white">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Đội nhà</th>
                <th>Đội khách</th>
                <th>Ngày thi đấu</th>
                <th>Sân</th>
                <th>Trạng thái</th>
                <th>Đăng ký</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m, i : ${matches}">
                <td th:text="${i.count}"></td>
                <td th:text="${m.matchDetails[0].team.teamName}"></td>
                <td th:text="${m.matchDetails[1].team.teamName}"></td>
                <td th:text="${#temporals.format(m.matchDate, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${m.stadium}"></td>
                <td>
                    <span th:text="${m.status}"
                          th:class="${m.status == 'CHƯA DIỄN RA'} ? 'badge bg-warning text-dark' : 'badge bg-secondary'">
                    </span>
                </td>
                <td>
                    <div th:each="md : ${m.matchDetails}">
                        <a th:href="@{/registration/match-detail/{id}(id=${md.id})}"
                           th:text="'Đăng ký: ' + ${md.team.teamName}"
                           class="btn btn-sm btn-primary mb-1">
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
