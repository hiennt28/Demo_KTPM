<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Người Nhận Giải</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:720px">
    <h3 th:text="${isEdit ? 'Cập nhật người nhận giải' : 'Thêm người nhận giải'}"></h3>
    <p class="text-muted mb-3" th:text="${award.awardName + ' | ' + award.awardType + ' | ' + award.scope}"></p>

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <form th:action="@{/award-results/award/{awardId}/save(awardId=${award.id})}"
          th:object="${awardResult}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3" th:if="${award.awardType == 'TẬP THỂ'}">
            <label class="form-label fw-bold">Đội nhận giải *</label>
            <select class="form-select" name="team.id">
                <option value="">-- Chọn đội --</option>
                <option th:each="team : ${teamOptions}"
                        th:value="${team.id}"
                        th:text="${team.teamName}"
                        th:selected="${awardResult.team != null and awardResult.team.id == team.id}">
                </option>
            </select>
        </div>

        <div class="mb-3" th:if="${award.awardType == 'CÁ NHÂN'}">
            <label class="form-label fw-bold">Cầu thủ nhận giải *</label>
            <select class="form-select" name="player.id">
                <option value="">-- Chọn cầu thủ --</option>
                <option th:each="player : ${playerOptions}"
                        th:value="${player.id}"
                        th:text="${player.fullName}"
                        th:selected="${awardResult.player != null and awardResult.player.id == player.id}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Người đại diện *</label>
            <input type="text" th:field="*{representative}" class="form-control">
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label fw-bold">Số tài khoản *</label>
                <input type="text" th:field="*{bankAccount}" class="form-control">
            </div>
            <div class="col mb-3">
                <label class="form-label fw-bold">Ngân hàng *</label>
                <input type="text" th:field="*{bankName}" class="form-control">
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"
                    th:text="${isEdit ? 'Lưu cập nhật' : 'Lưu người nhận'}"></button>
            <a th:href="@{/award-results/award/{awardId}(awardId=${award.id})}"
               class="btn btn-secondary">Quay lại</a>
        </div>
    </form>
</div>
</body>
</html>
