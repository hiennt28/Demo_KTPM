<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Giải Thưởng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:700px">
    <h3 th:text="${isEdit} ? 'Cập nhật Giải Thưởng' : 'Thêm Mới Giải Thưởng'"></h3>
    <hr>

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <form th:action="@{/awards/save}" th:object="${award}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label fw-bold">Tên giải thưởng *</label>
            <input type="text" th:field="*{awardName}" class="form-control"
                   th:classappend="${#fields.hasErrors('awardName')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{awardName}"></div>
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label fw-bold">Loại giải *</label>
                <select th:field="*{awardType}" class="form-select"
                        th:classappend="${#fields.hasErrors('awardType')} ? 'is-invalid'">
                    <option value="">-- Chọn loại --</option>
                    <option value="CÁ NHÂN">CÁ NHÂN</option>
                    <option value="TẬP THỂ">TẬP THỂ</option>
                </select>
                <div class="invalid-feedback" th:errors="*{awardType}"></div>
            </div>
            <div class="col mb-3">
                <label class="form-label fw-bold">Giá trị tiền thưởng (VNĐ) *</label>
                <input type="number" th:field="*{prizeAmount}" class="form-control" min="1"
                       th:classappend="${#fields.hasErrors('prizeAmount')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{prizeAmount}"></div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Phạm vi áp dụng *</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{scope}"
                       value="MÙA GIẢI" id="scopeSeason" onchange="toggleScope()">
                <label class="form-check-label" for="scopeSeason">Toàn mùa giải</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" th:field="*{scope}"
                       value="TRẬN ĐẤU" id="scopeMatch" onchange="toggleScope()">
                <label class="form-check-label" for="scopeMatch">Một trận đấu cụ thể</label>
            </div>
        </div>

        <div class="mb-3" id="seasonDiv">
            <label class="form-label fw-bold">Mùa giải</label>
            <select class="form-select" name="season.id">
                <option value="">-- Chọn mùa giải --</option>
                <option th:each="season : ${seasonOptions}"
                        th:value="${season.id}"
                        th:text="${season.seasonName}"
                        th:selected="${award.season != null and award.season.id == season.id}">
                </option>
            </select>
        </div>

        <div class="mb-3" id="matchDiv" style="display:none">
            <label class="form-label fw-bold">Chọn trận đấu</label>
            <select class="form-select" name="match.id">
                <option value="">-- Chọn trận đấu --</option>
                <option th:each="m : ${matches}"
                        th:value="${m.id}"
                        th:text="${(matchDisplayNames[m.id] != null ? matchDisplayNames[m.id] : 'Chưa xác định') + ' (' + #temporals.format(m.matchDate, 'dd/MM/yyyy') + ')'}"
                        th:selected="${award.match != null and award.match.id == m.id}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Điều kiện đạt giải</label>
            <textarea th:field="*{conditions}" class="form-control" rows="3"
                      placeholder="VD: Đội đứng đầu bảng xếp hạng cuối mùa giải..."></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"
                    th:text="${isEdit} ? 'Lưu cập nhật' : 'Lưu dữ liệu'"></button>
            <a href="/awards" class="btn btn-secondary">Quay lại</a>
        </div>
    </form>
</div>

<script>
    function toggleScope() {
        const scope = document.querySelector('input[name="scope"]:checked')?.value;
        document.getElementById('seasonDiv').style.display = scope === 'MÙA GIẢI' ? '' : 'none';
        document.getElementById('matchDiv').style.display = scope === 'TRẬN ĐẤU' ? '' : 'none';
    }

    window.onload = toggleScope;
</script>
</body>
</html>
