<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác Nhận Thanh Toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:650px">
    <h3>💳 Xác Nhận Thanh Toán</h3>
    <hr>

    <div class="card mb-3">
        <div class="card-header fw-bold">Thông tin thanh toán</div>
        <div class="card-body">
            <p><strong>Hạng mục:</strong>
                <span th:text="${result.award.awardName}"></span></p>
            <p><strong>Người/Đội nhận:</strong>
                <span th:if="${result.team}" th:text="${result.team.teamName}"></span>
                <span th:if="${result.playerContract}"
                      th:text="${result.playerContract.player.fullName}"></span>
            </p>
            <p><strong>Người đại diện:</strong>
                <span th:text="${result.representative}"></span></p>
            <p><strong>Số tài khoản:</strong>
                <span th:text="${result.bankAccount}"></span></p>
            <p><strong>Ngân hàng:</strong>
                <span th:text="${result.bankName}"></span></p>
            <p class="fs-5 text-danger fw-bold">
                <strong>Số tiền:</strong>
                <span th:text="${#numbers.formatDecimal(result.award.prizeAmount,0,'COMMA',0,'POINT')} + ' VNĐ'">
                </span>
            </p>
        </div>
    </div>

    <form th:action="@{/payment/result/{id}/pay(id=${result.id})}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Phương thức thanh toán *</label>
            <div class="form-check">
                <input class="form-check-input" type="radio"
                       name="paymentMethod" value="CHUYỂN KHOẢN" id="bank" required>
                <label class="form-check-label" for="bank">🏦 Chuyển khoản ngân hàng</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio"
                       name="paymentMethod" value="TIỀN MẶT" id="cash">
                <label class="form-check-label" for="cash">💵 Tiền mặt</label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <textarea name="note" class="form-control" rows="2"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"
                    onclick="return confirm('Xác nhận thực hiện thanh toán?')">
                ✅ Thực hiện thanh toán
            </button>
            <a href="/payment" class="btn btn-secondary">Quay lại</a>
        </div>
    </form>
</div>
</body>
</html>
