<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Biên Lai Thanh Toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:600px">

    <div class="alert alert-success text-center fs-5">Thanh toán thành công!</div>

    <div class="card border-success">
        <div class="card-header bg-success text-white text-center fw-bold fs-5">
            BIÊN LAI ĐIỆN TỬ
        </div>
        <div class="card-body">
            <p><strong>Mã giao dịch:</strong> #<span th:text="${payment.id}"></span></p>
            <p><strong>Hạng mục:</strong>
                <span th:text="${result.award.awardName}"></span></p>
            <p><strong>Mùa giải:</strong>
                <span th:text="${result.award.season != null ? result.award.season.seasonName : ''}"></span></p>
            <p><strong>Người/Đội nhận:</strong>
                <span th:if="${result.team}" th:text="${result.team.teamName}"></span>
                <span th:if="${result.playerContract}"
                      th:text="${result.playerContract.player.fullName}"></span>
            </p>
            <p><strong>Người đại diện:</strong>
                <span th:text="${result.representative}"></span></p>
            <p><strong>Số tài khoản:</strong>
                <span th:text="${result.bankAccount}"></span></p>
            <p><strong>Ngân hàng:</strong>
                <span th:text="${result.bankName}"></span></p>
            <p><strong>Phương thức:</strong>
                <span th:text="${payment.paymentMethod}"></span></p>
            <p class="fs-5 text-success fw-bold">
                <strong>Số tiền đã thanh toán:</strong>
                <span th:text="${#numbers.formatDecimal(payment.amount,0,'COMMA',0,'POINT')} + ' VNĐ'"></span>
            </p>
            <p><strong>Thời gian:</strong>
                <span th:text="${#temporals.format(payment.paidAt,'dd/MM/yyyy HH:mm:ss')}"></span>
            </p>
            <p th:if="${payment.note}">
                <strong>Ghi chú:</strong> <span th:text="${payment.note}"></span>
            </p>
        </div>
    </div>

    <div class="mt-3 d-flex gap-2">
        <a href="/payment" class="btn btn-primary">Quay lại danh sách</a>
        <button onclick="window.print()" class="btn btn-outline-secondary">In biên lai</button>
    </div>
</div>
</body>
</html>
