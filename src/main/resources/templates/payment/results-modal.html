<div>
    <div class="table-responsive">
        <table class="table table-bordered align-middle mb-0">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Người/Đội nhận</th>
                <th>Người đại diện</th>
                <th>Số tài khoản</th>
                <th>Ngân hàng</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r, i : ${results}">
                <td th:text="${i.count}"></td>
                <td>
                    <span th:if="${r.team}" th:text="${r.team.teamName}"></span>
                    <span th:if="${r.playerContract}"
                          th:text="${r.playerContract.player.fullName}"></span>
                </td>
                <td th:text="${r.representative}"></td>
                <td th:text="${r.bankAccount}"></td>
                <td th:text="${r.bankName}"></td>
                <td>
                    <span th:text="${r.paymentStatus}"
                          th:class="${r.paymentStatus == 'ĐÃ THANH TOÁN'} ? 'badge bg-success' : 'badge bg-warning text-dark'">
                    </span>
                </td>
                <td>
                    <a th:if="${r.paymentStatus == 'CHƯA THANH TOÁN'}"
                       th:href="@{/payment/result/{id}/pay(id=${r.id})}"
                       class="btn btn-sm btn-primary">Thanh toán</a>
                    <span th:if="${r.paymentStatus == 'ĐÃ THANH TOÁN'}"
                          class="text-muted small">Đã xử lý</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(results)}">
                <td colspan="7" class="text-center text-muted">
                    Chưa có người nhận giải cho hạng mục này.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
