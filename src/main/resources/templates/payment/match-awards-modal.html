<div>
    <div class="table-responsive">
        <table class="table table-bordered align-middle mb-0">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Tên giải thưởng</th>
                <th>Loại giải</th>
                <th>Giá trị (VNĐ)</th>
                <th>Điều kiện</th>
                <th>Xem kết quả</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a, i : ${awards}">
                <td th:text="${i.count}"></td>
                <td th:text="${a.awardName}"></td>
                <td>
                    <span th:text="${a.awardType}"
                          th:class="${a.awardType == 'CÁ NHÂN'} ? 'badge bg-info text-dark' : 'badge bg-primary'">
                    </span>
                </td>
                <td th:text="${#numbers.formatDecimal(a.prizeAmount,0,'COMMA',0,'POINT')}"></td>
                <td th:text="${a.conditions}"></td>
                <td>
                    <button type="button"
                            class="btn btn-sm btn-success js-open-results"
                            th:attr="data-award-id=${a.id},data-award-name=${a.awardName}">
                        Xem người nhận
                    </button>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(awards)}">
                <td colspan="6" class="text-center text-muted">
                    Trận đấu này chưa có giải thưởng nào.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
