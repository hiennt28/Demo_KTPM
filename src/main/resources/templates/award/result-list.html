<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Người Nhận Giải</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
            <li class="breadcrumb-item"><a href="/awards">Giải thưởng</a></li>
            <li class="breadcrumb-item active" aria-current="page">Người nhận giải</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h3 class="mb-1" th:text="${'Người nhận giải: ' + award.awardName}"></h3>
            <p class="text-muted mb-0">
                <span th:text="${award.awardType}"></span>
                |
                <span th:text="${award.scope}"></span>
            </p>
        </div>
        <a th:href="@{/award-results/award/{awardId}/new(awardId=${award.id})}" class="btn btn-primary">+ Thêm người nhận</a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-bordered bg-white mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Người/Đội nhận</th>
                    <th>Người đại diện</th>
                    <th>Số tài khoản</th>
                    <th>Ngân hàng</th>
                    <th>Trạng thái</th>
                    <th style="width: 180px;">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r, i : ${results}">
                    <td th:text="${i.count}"></td>
                    <td>
                        <span th:if="${r.team}" th:text="${r.team.teamName}"></span>
                        <span th:if="${r.player}" th:text="${r.player.fullName}"></span>
                    </td>
                    <td th:text="${r.representative}"></td>
                    <td th:text="${r.bankAccount}"></td>
                    <td th:text="${r.bankName}"></td>
                    <td>
                        <span th:text="${r.paymentStatus}"
                              th:class="${r.paymentStatus == 'ĐÃ THANH TOÁN'} ? 'badge bg-success' : 'badge bg-warning text-dark'"></span>
                    </td>
                    <td>
                        <div th:if="${r.paymentStatus != 'ĐÃ THANH TOÁN'}" class="d-flex flex-nowrap gap-1">
                            <a th:href="@{/award-results/{id}/edit(id=${r.id})}" class="btn btn-sm btn-warning">Sửa</a>
                            <form th:action="@{/award-results/{id}/delete(id=${r.id})}"
                                  method="post"
                                  class="mb-0"
                                  onsubmit="return confirm('Xóa người nhận giải này?')">
                                <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                            </form>
                        </div>
                        <span th:if="${r.paymentStatus == 'ĐÃ THANH TOÁN'}" class="text-muted small fw-semibold">
                            Đã khóa sau thanh toán
                        </span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(results)}">
                    <td colspan="7" class="text-center text-muted py-4">Chưa có người nhận giải nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
